name: Patch SQL Endpoint Registry Loader

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/ops/trigger-sql-endpoint-loader-patch.txt"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wire SQL endpoint loader
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("http-generic-api/registrySheets.js")
          text = path.read_text(encoding="utf-8")

          import_line = 'import { loadSqlEndpointRegistry, shouldReadEndpointRegistryFromSql } from "./sqlEndpointRegistryLoader.js";\n'
          import_marker = 'import { readTable as sqlReadTable } from "./sqlAdapter.js";\n'
          if import_line not in text:
              if import_marker not in text:
                  raise SystemExit("sqlAdapter import marker not found")
              text = text.replace(import_marker, import_marker + import_line, 1)

          anchor = 'const { ENDPOINT_REGISTRY_SHEET, REGISTRY_SPREADSHEET_ID, debugLog, getCell, headerMap, registryError } = deps;'
          branch = ''' const { ENDPOINT_REGISTRY_SHEET, REGISTRY_SPREADSHEET_ID, debugLog, getCell, headerMap, registryError } = deps;
  if (shouldReadEndpointRegistryFromSql()) {
    const rows = await loadSqlEndpointRegistry();
    debugLog("ENDPOINT_REGISTRY_SOURCE:", "sql");
    debugLog("ENDPOINT_REGISTRY_SQL_ROW_COUNT:", String(rows.length));
    return rows.filter(row => row.endpoint_key);
  }'''
          if "loadSqlEndpointRegistry()" not in text:
              if anchor not in text:
                  raise SystemExit("loadEndpointRegistry deps marker not found")
              text = text.replace(anchor, branch, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate
        run: |
          test -f http-generic-api/sqlEndpointRegistryLoader.js
          grep -q "loadSqlEndpointRegistry" http-generic-api/registrySheets.js
          grep -q "shouldReadEndpointRegistryFromSql" http-generic-api/registrySheets.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add http-generic-api/registrySheets.js http-generic-api/sqlEndpointRegistryLoader.js
          git commit -m "fix: wire endpoint registry SQL loader"
          git push
