name: Patch SQL Endpoint Registry Loader

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/ops/trigger-sql-endpoint-loader-patch.txt"
      - ".github/workflows/patch-sql-endpoint-loader.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add SQL endpoint registry loader and wire loadEndpointRegistry
        run: |
          python <<'PY'
          from pathlib import Path

          loader_path = Path("http-generic-api/sqlEndpointRegistryLoader.js")
          loader_path.write_text('''import { readTable as sqlReadTable } from "./sqlAdapter.js";

const ENDPOINT_REGISTRY_SQL_TABLE = "API Actions Endpoint Registry";

export function shouldReadEndpointRegistryFromSql(env = process.env) {
  const source = String(env.ENDPOINT_REGISTRY_SOURCE || env.DATA_SOURCE || "sql")
    .trim()
    .toLowerCase();
  const legacySheetsEnabled =
    String(env.LEGACY_SHEET_ENDPOINT_REGISTRY_ENABLED || "false")
      .trim()
      .toLowerCase() === "true";

  // SQL is the default authority. Sheets are legacy-only and require both flags.
  return source !== "sheets" || !legacySheetsEnabled;
}

function normalizeEndpointRegistryRow(row = {}) {
