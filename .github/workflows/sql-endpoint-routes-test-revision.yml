name: SQL Endpoint Registry Routes Test Revision

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Cloud Run service name"
        required: false
        default: "http-generic-api"
        type: string
      region:
        description: "Cloud Run region"
        required: false
        default: "europe-west1"
        type: string
      enable_flag:
        description: "Enable SQL endpoint registry routes in the test revision"
        required: false
        default: "true"
        type: string
      tag_name:
        description: "Tag name for the no-traffic test revision"
        required: false
        default: "sql-endpoint-test"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  create-test-revision:
    name: Create no-traffic Cloud Run test revision
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create no-traffic revision with SQL routes flag
        id: revision
        run: |
          set -euo pipefail

          SERVICE="${{ inputs.service }}"
          REGION="${{ inputs.region }}"
          FLAG="${{ inputs.enable_flag }}"
          TAG="${{ inputs.tag_name }}"

          echo "Creating test revision for ${SERVICE} in ${REGION} with ENABLE_SQL_ENDPOINT_REGISTRY_ROUTES=${FLAG}"

          gcloud run services update "${SERVICE}" \
            --region "${REGION}" \
            --update-env-vars "ENABLE_SQL_ENDPOINT_REGISTRY_ROUTES=${FLAG}" \
            --no-traffic

          REVISION="$(gcloud run revisions list \
            --service "${SERVICE}" \
            --region "${REGION}" \
            --sort-by '~metadata.creationTimestamp' \
            --limit 1 \
            --format 'value(metadata.name)')"

          if [ -z "${REVISION}" ]; then
            echo "Failed to resolve latest revision name" >&2
            exit 1
          fi

          gcloud run services update-traffic "${SERVICE}" \
            --region "${REGION}" \
            --set-tags "${TAG}=${REVISION}"

          URL="$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --format "value(status.url)")"

          TAGGED_URL="$(URL="${URL}" TAG="${TAG}" node -e "const url=process.env.URL; const tag=process.env.TAG; const u=new URL(url); u.hostname = tag + '---' + u.hostname; console.log(u.toString().replace(/\/$/, ''));")"

          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "tagged_url=${TAGGED_URL}" >> "${GITHUB_OUTPUT}"
          echo "Test revision: ${REVISION}"
          echo "Tagged URL: ${TAGGED_URL}"

      - name: Smoke test source-status
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          TAGGED_URL: ${{ steps.revision.outputs.tagged_url }}
        run: |
          set -euo pipefail
          curl -fSS \
            -H "Authorization: Bearer ${BACKEND_API_KEY}" \
            "${TAGGED_URL}/admin/sql/endpoint-registry/source-status" | tee source-status.json

      - name: Smoke test github create-ref endpoint resolve
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          TAGGED_URL: ${{ steps.revision.outputs.tagged_url }}
        run: |
          set -euo pipefail
          curl -fSS \
            -H "Authorization: Bearer ${BACKEND_API_KEY}" \
            "${TAGGED_URL}/admin/sql/endpoint-registry/resolve?parent_action_key=github_git_data&endpoint_key=createGitRef" | tee resolve.json

      - name: Result
        run: |
          echo "SQL endpoint registry route test revision created and smoke tests passed."
          echo "Revision: ${{ steps.revision.outputs.revision }}"
          echo "Tagged URL: ${{ steps.revision.outputs.tagged_url }}"
