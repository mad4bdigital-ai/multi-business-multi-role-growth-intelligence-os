name: SQL Endpoint Registry Routes Test Revision

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Google Cloud project ID. Defaults to repository variable GCP_PROJECT_ID."
        required: false
        default: ""
        type: string
      service:
        description: "Cloud Run service"
        required: false
        default: "http-generic-api"
        type: string
      region:
        description: "Cloud Run region"
        required: false
        default: "europe-west1"
        type: string
      enable_flag:
        description: "Enable SQL endpoint registry routes"
        required: false
        default: "true"
        type: string
      tag_name:
        description: "No-traffic test revision tag"
        required: false
        default: "sql-endpoint-test"
        type: string

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ inputs.project_id || vars.GCP_PROJECT_ID }}

jobs:
  create-test-revision:
    runs-on: ubuntu-latest
    steps:
      - name: Validate config
        env:
          WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "$PROJECT_ID" || (echo "Set repository variable GCP_PROJECT_ID or pass project_id input." >&2; exit 1)
          test -n "$WIF_PROVIDER" || (echo "Missing repository variable GCP_WORKLOAD_IDENTITY_PROVIDER." >&2; exit 1)
          test -n "$DEPLOYER_SERVICE_ACCOUNT" || (echo "Missing repository variable GCP_DEPLOYER_SERVICE_ACCOUNT." >&2; exit 1)
          echo "Using project: $PROJECT_ID"

      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create no-traffic revision and tag it
        id: rev
        env:
          SERVICE: ${{ inputs.service }}
          REGION: ${{ inputs.region }}
          TAG: ${{ inputs.tag_name }}
          FLAG: ${{ inputs.enable_flag }}
        run: |
          set -euo pipefail
          test -n "$SERVICE" || (echo "service input is required" >&2; exit 1)
          test -n "$REGION" || (echo "region input is required" >&2; exit 1)
          test -n "$TAG" || (echo "tag_name input is required" >&2; exit 1)
          test -n "$FLAG" || (echo "enable_flag input is required" >&2; exit 1)

          gcloud config set project "$PROJECT_ID" --quiet

          echo "Creating test revision for ${SERVICE} in ${REGION} on project ${PROJECT_ID} with ENABLE_SQL_ENDPOINT_REGISTRY_ROUTES=${FLAG}"

          gcloud run services update "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --update-env-vars "ENABLE_SQL_ENDPOINT_REGISTRY_ROUTES=$FLAG" \
            --no-traffic \
            --quiet

          REVISION="$(gcloud run revisions list \
            --project "$PROJECT_ID" \
            --service "$SERVICE" \
            --region "$REGION" \
            --sort-by '~metadata.creationTimestamp' \
            --limit 1 \
            --format 'value(metadata.name)')"

          test -n "$REVISION" || (echo "Could not resolve latest revision." >&2; exit 1)

          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --set-tags "$TAG=$REVISION" \
            --quiet

          URL="$(gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format 'value(status.url)')"

          HOST="${URL#https://}"
          HOST="${HOST#http://}"
          HOST="${HOST%/}"
          TAGGED_URL="https://${TAG}---${HOST}"

          echo "revision=$REVISION" >> "$GITHUB_OUTPUT"
          echo "tagged_url=$TAGGED_URL" >> "$GITHUB_OUTPUT"
          echo "Revision: $REVISION"
          echo "Tagged URL: $TAGGED_URL"

      - name: Smoke source-status
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          TAGGED_URL: ${{ steps.rev.outputs.tagged_url }}
        run: |
          set -euo pipefail
          test -n "$BACKEND_API_KEY" || (echo "Missing BACKEND_API_KEY secret." >&2; exit 1)
          curl -fSS \
            -H "Authorization: Bearer $BACKEND_API_KEY" \
            "$TAGGED_URL/admin/sql/endpoint-registry/source-status" | tee source-status.json

      - name: Smoke createGitRef resolver
        env:
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          TAGGED_URL: ${{ steps.rev.outputs.tagged_url }}
        run: |
          set -euo pipefail
          curl -fSS \
            -H "Authorization: Bearer $BACKEND_API_KEY" \
            "$TAGGED_URL/admin/sql/endpoint-registry/resolve?parent_action_key=github_git_data&endpoint_key=createGitRef" | tee resolve.json

      - name: Result
        run: |
          echo "SQL  endpoint registry route test revision created and smoke tests passed."
          echo "Revision: ${{ steps.rev.outputs.revision }}"
          echo "Tagged URL: ${{ steps.rev.outputs.tagged_url }}"
