name: Fallback Hostinger SSH Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Fallback deployment target: dev, auth, connector, or both"
        required: true
        default: "auth"
        type: choice
        options:
          - dev
          - auth
          - connector
          - both
      run_runtime_verify:
        description: "Run runtime verification after deploy"
        required: false
        default: true
        type: boolean

concurrency:
  group: fallback-hostinger-ssh-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  note:
    name: Manual fallback only
    runs-on: ubuntu-latest
    steps:
      - name: Explain preferred deployment path
        run: |
          echo "Preferred deployment path: Hostinger hPanel Auto Deploy from GitHub."
          echo "This workflow is intentionally manual-only and should be used only if Hostinger Auto Deploy is degraded."

  build:
    name: Build fallback artifact
    runs-on: ubuntu-latest
    needs: note
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            http-generic-api/package-lock.json

      - name: Install API dependencies
        working-directory: http-generic-api
        run: npm ci --omit=dev

      - name: Validate deploy-critical modules
        run: |
          set -euo pipefail
          node --check local-connector/server.mjs
          node --check http-generic-api/server.js
          node --check http-generic-api/routes/connectorAgentRoutes.js
          grep -q "handleN8nV2" local-connector/server.mjs
          grep -q "N8N_COMMAND" local-connector/server.mjs
          grep -q "connector-agent/version" http-generic-api/routes/connectorAgentRoutes.js

      - name: Create fallback artifact
        run: |
          set -euo pipefail
          mkdir -p .deploy
          rsync -a ./ .deploy/ \
            --exclude='.git' \
            --exclude='.deploy' \
            --exclude='node_modules' \
            --exclude='http-generic-api/node_modules' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*'
          cat > .deploy/DEPLOYMENT_COMMIT.json <<JSON
          {
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployment_mode": "manual_fallback_ssh"
          }
          JSON

      - name: Upload fallback artifact
        uses: actions/upload-artifact@v4
        with:
          name: fallback-hostinger-node-app
          path: .deploy
          retention-days: 3
          include-hidden-files: true

  deploy-dev:
    name: Fallback deploy dev.mad4b.com app
    runs-on: ubuntu-latest
    needs: build
    if: inputs.target == 'dev'
    environment: hostinger-dev
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fallback-hostinger-node-app
          path: deploy

      - name: Deploy over SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "deploy/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          TARGET: ${{ secrets.HOSTINGER_DEV_NODE_PATH }}
          EXCLUDE: "/.env,/.env.*,/.htaccess,/node_modules,/http-generic-api/node_modules,/storage,/uploads"

      - name: Install production dependencies and restart dev app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOSTINGER_DEV_NODE_PATH }}/http-generic-api"
            npm ci --omit=dev
            cd "${{ secrets.HOSTINGER_DEV_NODE_PATH }}"
            if [ -n "${{ secrets.HOSTINGER_DEV_RESTART_CMD }}" ]; then
              ${{ secrets.HOSTINGER_DEV_RESTART_CMD }}
            else
              mkdir -p tmp && touch tmp/restart.txt
            fi

      - name: Verify dev deployment
        run: |
          set -euo pipefail
          curl -fsS "https://dev.mad4b.com/health" | tee dev-health.json
          curl -fsS "https://dev.mad4b.com/deployment-info" | tee dev-deployment-info.json

  deploy-auth:
    name: Fallback deploy auth.mad4b.com app
    runs-on: ubuntu-latest
    needs: build
    if: inputs.target == 'auth' || inputs.target == 'both'
    environment: hostinger-auth
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fallback-hostinger-node-app
          path: deploy

      - name: Deploy over SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "deploy/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          TARGET: ${{ secrets.HOSTINGER_AUTH_NODE_PATH }}
          EXCLUDE: "/.env,/.env.*,/.htaccess,/node_modules,/http-generic-api/node_modules,/storage,/uploads"

      - name: Install production dependencies and restart auth app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOSTINGER_AUTH_NODE_PATH }}/http-generic-api"
            npm ci --omit=dev
            cd "${{ secrets.HOSTINGER_AUTH_NODE_PATH }}"
            if [ -n "${{ secrets.HOSTINGER_AUTH_RESTART_CMD }}" ]; then
              ${{ secrets.HOSTINGER_AUTH_RESTART_CMD }}
            else
              mkdir -p tmp && touch tmp/restart.txt
            fi

      - name: Verify auth deployment
        run: |
          set -euo pipefail
          curl -fsS "https://auth.mad4b.com/health" | tee health.json
          curl -fsS "https://auth.mad4b.com/connector-agent/version" | tee connector-agent-version.json
          node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('connector-agent-version.json','utf8')); if(!j.ok || !j.agent?.has_n8n_lifecycle){ console.error(j); process.exit(1); } console.log('Connector agent verified:', j.agent.sha256);"

  deploy-connector:
    name: Fallback deploy connector.mad4b.com app
    runs-on: ubuntu-latest
    needs: build
    if: inputs.target == 'connector' || inputs.target == 'both'
    environment: hostinger-connector
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fallback-hostinger-node-app
          path: deploy

      - name: Deploy over SSH/rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "deploy/"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          TARGET: ${{ secrets.HOSTINGER_CONNECTOR_NODE_PATH }}
          EXCLUDE: "/.env,/.env.*,/.htaccess,/node_modules,/http-generic-api/node_modules,/storage,/uploads"

      - name: Install production dependencies and restart connector app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.HOSTINGER_CONNECTOR_NODE_PATH }}/http-generic-api"
            npm ci --omit=dev
            cd "${{ secrets.HOSTINGER_CONNECTOR_NODE_PATH }}"
            if [ -n "${{ secrets.HOSTINGER_CONNECTOR_RESTART_CMD }}" ]; then
              ${{ secrets.HOSTINGER_CONNECTOR_RESTART_CMD }}
            else
              mkdir -p tmp && touch tmp/restart.txt
            fi

      - name: Verify connector hostname
        run: curl -fsS "https://connector.mad4b.com/health" | tee connector-health.json
