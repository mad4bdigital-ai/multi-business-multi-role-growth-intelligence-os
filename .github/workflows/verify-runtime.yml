name: Verify Runtime

on:
  workflow_dispatch:
    inputs:
      runtime_base_url:
        description: "Base URL of the deployed runtime (e.g. https://your-deployment.example.com)"
        required: true
        type: string
      environment_label:
        description: "Label for this deployment (e.g. staging, production)"
        required: false
        default: "unspecified"
        type: string
      expect_queue_available:
        description: "Whether this deployment is expected to have live Redis/BullMQ queue connectivity"
        required: false
        default: "true"
        type: string
      expect_worker_enabled:
        description: "Whether this runtime instance is expected to run the BullMQ worker"
        required: false
        default: "true"
        type: string
      verify_execution_log_row:
        description: "Whether to verify latest Execution Log Unified row parity"
        required: false
        default: "true"
        type: string
      execution_log_verify_path:
        description: "Runtime endpoint that returns the latest Execution Log Unified row"
        required: false
        default: "/governance/execution-log-latest"
        type: string

jobs:
  verify:
    name: Patch-vs-Runtime Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Record deployment context
        run: |
          echo "Environment:    ${{ inputs.environment_label }}"
          echo "Runtime URL:    ${{ inputs.runtime_base_url }}"
          echo "Commit:         ${{ github.sha }}"
          echo "Triggered by:   ${{ github.actor }}"
          echo "Triggered at:   $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Inspect execution-log sheet read attempts
        working-directory: http-generic-api
        env:
          RUNTIME_BASE_URL: ${{ inputs.runtime_base_url }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          node -e '
          const base = (process.env.RUNTIME_BASE_URL || "").replace(/\/$/, "");
          const key = process.env.BACKEND_API_KEY || "";
          if (!base) throw new Error("Missing RUNTIME_BASE_URL");
          if (!key) throw new Error("Missing BACKEND_API_KEY");

          fetch(`${base}/governance/execution-log-latest-inspect`, {
            headers: {
              "Authorization": `Bearer ${key}`,
              "Content-Type": "application/json"
            }
          })
            .then(async (res) => {
              const text = await res.text();
              let body;
              try { body = JSON.parse(text); } catch { body = { raw: text }; }

              console.log("STATUS:", res.status);
              console.log(JSON.stringify(body, null, 2));

              if (!res.ok) process.exit(1);
            })
            .catch((err) => {
              console.error(err);
              process.exit(1);
            });
          '

      - name: Run patch-vs-runtime verification
        working-directory: http-generic-api
        env:
          RUNTIME_BASE_URL: ${{ inputs.runtime_base_url }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
          EXPECT_QUEUE_AVAILABLE: ${{ inputs.expect_queue_available }}
          EXPECT_WORKER_ENABLED: ${{ inputs.expect_worker_enabled }}
          VERIFY_EXECUTION_LOG_ROW: ${{ inputs.verify_execution_log_row }}
          EXECUTION_LOG_VERIFY_PATH: ${{ inputs.execution_log_verify_path }}
        run: node verify-runtime.mjs

      - name: Confirm parity result
        if: success()
        run: |
          echo "DEPLOYMENT PARITY: PASS"
          echo "Commit ${{ github.sha }} has verified runtime alignment against ${{ inputs.runtime_base_url }}"

      - name: Report drift on failure
        if: failure()
        run: |
          echo "DEPLOYMENT PARITY: FAIL"
          echo "Runtime at ${{ inputs.runtime_base_url }} does not match expected behavior for commit ${{ github.sha }}"
          echo "Review the verify-runtime output above for drift class and resolution steps."
          exit 1
