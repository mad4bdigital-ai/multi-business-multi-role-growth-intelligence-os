{"name":"Patch Schema Source Telemetry","on":{"push":{"branches":["main"],"paths":[".github/ops/trigger-schema-source-telemetry.txt"]}},"permissions":{"contents":"write"},"jobs":{"patch":{"runs-on":"ubuntu-latest","steps":[{"uses":"actions/checkout@v4"},{"name":"Add schema source telemetry to executionPreparation","run":"set -euo pipefail\nnode <<'NODE'\nconst fs = require(\"fs\");\nconst file = \"http-generic-api/executionPreparation.js\";\nlet src = fs.readFileSync(file, \"utf8\");\n\nconst schemaContractBlock = [\n  '  const schemaContract = endpointLocalSchemaContract ||',\n  '    await fetchSchemaContract(drive, action.openai_schema_file_id);',\n  '  const schemaOperationInfo = await resolveSchemaOperation(schemaContract, resolvedMethodPath.method, schemaLookupPath);'\n].join(\"\\n\");\n\nconst schemaContractTelemetryBlock = [\n  '  const schemaContract = endpointLocalSchemaContract ||',\n  '    await fetchSchemaContract(drive, action.openai_schema_file_id);',\n  '  const schemaSource = schemaContract?.source ||',\n  '    (endpointLocalSchemaContract ? \"endpoint_local\" : \"action_openai_schema_file\");',\n  '  const schemaContractFileId = schemaContract?.fileId || action.openai_schema_file_id || \"\";',\n  '  debugLog(\"SCHEMA_CONTRACT_SOURCE:\", JSON.stringify({',\n  '    source: schemaSource,',\n  '    schema_name: schemaContract?.name || \"\",',\n  '    schema_contract_file_id: schemaContractFileId,',\n  '    action_openai_schema_file_id: action.openai_schema_file_id || \"\"',\n  '  }));',\n  '  const schemaOperationInfo = await resolveSchemaOperation(schemaContract, resolvedMethodPath.method, schemaLookupPath);'\n].join(\"\\n\");\n\nif (!src.includes('const schemaSource = schemaContract?.source ||')) {\n  if (!src.includes(schemaContractBlock)) {\n    throw new Error(\"schema contract block not found for telemetry patch\");\n  }\n  src = src.replace(schemaContractBlock, schemaContractTelemetryBlock);\n}\n\nconst failureDetailsBlock = [\n  '          openai_schema_file_id: action.openai_schema_file_id,',\n  '          schema_name: schemaContract.name'\n].join(\"\\n\");\nconst failureDetailsTelemetryBlock = [\n  '          openai_schema_file_id: action.openai_schema_file_id,',\n  '          schema_contract_file_id: schemaContractFileId,',\n  '          schema_source: schemaSource,',\n  '          schema_name: schemaContract.name'\n].join(\"\\n\");\nif (!src.includes('          schema_source: schemaSource,')) {\n  if (!src.includes(failureDetailsBlock)) {\n    throw new Error(\"failure validation details block not found\");\n  }\n  src = src.replace(failureDetailsBlock, failureDetailsTelemetryBlock);\n}\n\nconst successPayloadBlock = [\n  '      openai_schema_file_id: action.openai_schema_file_id,',\n  '      schema_name: schemaContract.name'\n].join(\"\\n\");\nconst successPayloadTelemetryBlock = [\n  '      openai_schema_file_id: action.openai_schema_file_id,',\n  '      schema_contract_file_id: schemaContractFileId,',\n  '      schema_source: schemaSource,',\n  '      schema_name: schemaContract.name'\n].join(\"\\n\");\nif (!src.includes('      schema_source: schemaSource,')) {\n  if (!src.includes(successPayloadBlock)) {\n    throw new Error(\"success validation payload block not found\");\n  }\n  src = src.replace(successPayloadBlock, successPayloadTelemetryBlock);\n}\n\nconst returnBlock = [\n  '    schemaContract,',\n  '    schemaOperationInfo,'\n].join(\"\\n\");\nconst returnTelemetryBlock = [\n  '    schemaContract,',\n  '    schemaSource,',\n  '    schemaContractFileId,',\n  '    schemaOperationInfo,'\n].join(\"\\n\");\nif (!src.includes('    schemaSource,\\n    schemaContractFileId,')) {\n  if (!src.includes(returnBlock)) {\n    throw new Error(\"return telemetry block not found\");\n  }\n  src = src.replace(returnBlock, returnTelemetryBlock);\n}\n\nfs.writeFileSync(file, src);\nNODE\n\nnode --check http-generic-api/endpointSchemaResolver.js\nnode --check http-generic-api/executionPreparation.js\n\ngrep -n \"SCHEMA_CONTRACT_SOURCE\" http-generic-api/executionPreparation.js\ngrep -n \"schema_source: schemaSource\" http-generic-api/executionPreparation.js\n\nif git diff --quiet; then\n  echo \"No changes to commit.\"\n  exit 0\nfi\n\ngit config user.name \"mad4bdigital-ai\"\ngit config user.email \"mad4b.digital@gmail.com\"\ngit add http-generic-api/executionPreparation.js\ngit commit -m \"feat: log schema contract source telemetry\"\ngit push\n"}]}}}