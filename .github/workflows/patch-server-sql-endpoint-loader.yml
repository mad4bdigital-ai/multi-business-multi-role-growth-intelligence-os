name: Patch server SQL Endpoint Registry Override

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/ops/trigger-server-sql-endpoint-loader-patch.txt"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wire SQL endpoint loader in server.js
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("http-generic-api/server.js")
          text = path.read_text(encoding="utf-8")

          registry_import_re = re.compile(
              r'import\s*{(?P<body>[\s\S]*?)}\s*from\s*["\']\.\/registrySheets\.js["\'];',
              re.MULTILINE,
          )
          match = registry_import_re.search(text)
          if not match:
              raise SystemExit("registrySheets.js import block not found in server.js")

          body = match.group("body")
          if "loadEndpointRegistry" not in body and "loadEndpointRegistryFromSheets" not in body:
              raise SystemExit("server.js registrySheets import does not include loadEndpointRegistry")

          if "loadEndpointRegistry as loadEndpointRegistryFromSheets" not in body:
              body = re.sub(
                  r'(?<![\w$])loadEndpointRegistry(?![\w$])',
                  'loadEndpointRegistry as loadEndpointRegistryFromSheets',
                  body,
                  count=1,
              )
              patched_import = f'import {{{body}}} from "./registrySheets.js";'
              text = text[:match.start()] + patched_import + text[match.end():]

          loader_import = (
              'import { loadSqlEndpointRegistry, shouldReadEndpointRegistryFromSql } '
              'from "./sqlEndpointRegistryLoader.js";\n'
          )
          if "sqlEndpointRegistryLoader.js" not in text:
              import_block = re.match(r'(?s)((?:import[\s\S]*?;\n)+)', text)
              if not import_block:
                  raise SystemExit("top-level import block not found in server.js")
              text = text[:import_block.end()] + loader_import + text[import_block.end():]

          wrapper_marker = "SERVER_ENDPOINT_REGISTRY_SQL_OVERRIDE"
          wrapper = '''
// SERVER_ENDPOINT_REGISTRY_SQL_OVERRIDE
async function loadEndpointRegistry(...args) {
  if (shouldReadEndpointRegistryFromSql()) {
    const rows = await loadSqlEndpointRegistry();
    console.log("ENDPOINT_REGISTRY_SOURCE: sql");
    console.log("ENDPOINT_REGISTRY_SQL_ROW_COUNT:", String(rows.length));
    return rows.filter(row => row.endpoint_key);
  }

  return loadEndpointRegistryFromSheets(...args);
}

'''
          if wrapper_marker not in text:
              import_block = re.match(r'(?s)((?:import[\s\S]*?;\n)+)', text)
              if not import_block:
                  raise SystemExit("top-level import block not found after loader import")
              text = text[:import_block.end()] + wrapper + text[import_block.end():]

          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate syntax and patch markers
        run: |
          grep -q "SERVER_ENDPOINT_REGISTRY_SQL_OVERRIDE" http-generic-api/server.js
          grep -q "loadEndpointRegistryFromSheets" http-generic-api/server.js
          grep -q "sqlEndpointRegistryLoader.js" http-generic-api/server.js
          node --check http-generic-api/server.js
          node --check http-generic-api/sqlEndpointRegistryLoader.js

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add http-generic-api/server.js http-generic-api/sqlEndpointRegistryLoader.js
          git commit -m "fix: wire endpoint registry SQL loader in server"
          git push
