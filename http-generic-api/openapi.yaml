  # Batch Dispatcher

  /batch:
    post:
      tags: [execution]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: batchDispatch
      summary: Execute up to 50 API requests in a single call (parallel or sequential)
      description: >
        Fan-out dispatcher that self-calls internal routes. Forwards Authorization and
        x-api-key headers. /batch sub-requests are blocked to prevent loops.
        parallel=true (default) executes all requests concurrently via Promise.all.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requests]
              properties:
                requests:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [method, path]
                    properties:
                      method: { type: string, enum: [GET, POST, PUT, PATCH, DELETE] }
                      path: { type: string, pattern: "^/" }
                      body: { type: object, additionalProperties: true }
                parallel: { type: boolean, default: true }
      responses:
        "200":
          description: Batch results
          content:
            application/json:
              schema:
                type: object
                required: [ok, count, results]
                properties:
                  ok: { type: boolean }
                  count: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index: { type: integer }
                        status: { type: integer }
                        ok: { type: boolean }
                        body: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

