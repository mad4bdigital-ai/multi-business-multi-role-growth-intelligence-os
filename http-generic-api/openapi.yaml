      operationId: callAdminTool
      summary: Execute any admin platform tool by name
      description: "Executes a tool from admin_platform_endpoint_tools. Use listAdminTools to get tool names and inputSchema. Pass tool arguments in tool_args. Path params are substituted automatically. Returns the raw upstream response."
      requestBody:
        required: true
