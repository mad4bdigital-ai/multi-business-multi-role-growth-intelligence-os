  # ├втАЭтВм├втАЭтВм Workflow Orchestration ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм

  /workflow-runs:
    post:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: createWorkflowRun
      summary: Start a workflow run (auto-creates approval holds when access requires review)
      description: >
        Runs the access decision engine first. If decision is REQUIRE_REVIEW or
        REQUIRE_SUPERVISOR_APPROVAL, the run starts in 'pending' status and an
        approval_hold is created. Otherwise the run starts 'running'.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkflowRunCreateRequest" }
      responses:
        "201":
          description: Workflow run created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, run_id, status]
                properties:
                  ok: { type: boolean }
                  run_id: { type: string, format: uuid }
                  status: { type: string, enum: [pending, running] }
                  decision: { type: string }
                  hold_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /workflow-runs/{run_id}:
    get:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: getWorkflowRun
      summary: Get a workflow run by ID
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Workflow run, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: updateWorkflowRun
      summary: Update workflow run status or output
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending, running, completed, failed, cancelled] }
                output_payload: { type: object, additionalProperties: true }
                error_message: { type: string }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /tenants/{tenant_id}/workflow-runs:
    get:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: getTenantWorkflowRuns
      summary: List workflow runs for a tenant
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: Workflow run list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /workflow-runs/{run_id}/steps:
    post:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: createStepRun
      summary: Record a step execution within a workflow run
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [step_key]
              properties:
                step_key: { type: string }
                step_order: { type: integer }
                status: { type: string, enum: [pending, running, completed, failed, skipped], default: pending }
                input_payload: { type: object, additionalProperties: true }
                output_payload: { type: object, additionalProperties: true }
      responses:
        "201": { description: Step run created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /approval-holds:
    get:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: listApprovalHolds
      summary: List approval holds pending human decision
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, approved, rejected, expired] } }
        - { name: hold_type, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200": { description: Approval hold list, content: { application/json: { schema: { $ref: "#/components/schemas/PlatformListResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /approval-holds/{hold_id}/decide:
    post:
      tags: [workflows]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: decideApprovalHold
      summary: Approve or reject an approval hold (resumes or fails parent workflow run)
      parameters:
        - { name: hold_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalDecisionRequest" }
      responses:
        "200":
          description: Decision recorded and parent workflow run updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, hold_id, decision, run_id]
                properties:
                  ok: { type: boolean }
                  hold_id: { type: string }
                  decision: { type: string }
                  run_id: { type: string }
                  run_status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

