        parent_span_id: { type: string }
        span_name: { type: string }
        tenant_id: { type: string, format: uuid }
        service_name: { type: string }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }
        duration_ms: { type: integer }
        status:
          type: string
          enum: [ok, error, timeout]
        attributes:
          type: object
          additionalProperties: true

    UsageRecordRequest:
      type: object
      additionalProperties: false
      required: [tenant_id, meter_key, quantity]
      properties:
        tenant_id: { type: string, format: uuid }
        meter_key: { type: string }
        quantity: { type: number }
        period_date:
          type: string
          format: date
          description: Defaults to today (UTC). Used for daily bucket upsert.

    ReleaseReadinessResponse:
      type: object
      additionalProperties: false
      required: [ok, overall, run_id, checked_at, summary]
      properties:
        ok: { type: boolean }
        overall:
          type: string
          enum: [pass, warn, fail]
        run_id: { type: string, format: uuid }
        checked_at: { type: string, format: date-time }
        summary:
          type: object
          additionalProperties: false
          required: [total, pass, warn, fail, platform_tables_total, platform_tables_ok]
          properties:
            total: { type: integer }
            pass: { type: integer }
            warn: { type: integer }
            fail: { type: integer }
            platform_tables_total: { type: integer }
            platform_tables_ok: { type: integer }
        db_connectivity:
          type: object
          additionalProperties: true
        platform_tables:
          type: object
          additionalProperties: true
        legacy_tables:
          type: object
          additionalProperties: true
        seed_data:
          type: object
          additionalProperties: true
        migration_inventory:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request body or missing required field
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Invalid or missing backend API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

security: []

x-tenant-gpt-auth:
  security_scheme_name: userBearerAuth
  action_auth_preset:
    authentication_type: OAuth
    schema_url: https://auth.mad4b.com/openapi.tenant-gpt.auth.yaml
    client_id: mad4b-tenant-gpt
    client_secret: <stored-in-platform-runtime-config>
    client_secret_config_key: tenant_gpt.oauth.client
    authorization_url: https://auth.mad4b.com/auth/oauth/authorize
    token_url: https://auth.mad4b.com/auth/oauth/token
    token_exchange_method: Default (POST request)
    callback_urls_to_allow:
      - https://chat.openai.com/aip/g-d36db295032b9022dd77233041763f513e8ba5fa/oauth/callback
      - https://chat.openai.com/aip/{g-GPT-ID}/oauth/callback
      - https://chatgpt.com/aip/{g-GPT-ID}/oauth/callback
    scope_links:
      - https://auth.mad4b.com/scopes/tenant.links
      - https://auth.mad4b.com/scopes/tenant.status
      - https://auth.mad4b.com/scopes/tenant.activation
      - https://auth.mad4b.com/scopes/tenant.install
      - https://auth.mad4b.com/scopes/tenant.system-tools
  security_scheme:
    type: oauth2
    description: "Tenant GPT OAuth. ChatGPT signs in through the Growth Intelligence Platform popup, then /auth/oauth/token mints a fresh Mad4B tenant access JWT with issuer, audience, subject, scope, user_id, and tenant_id claims. Google Sign-In is only an upstream identity proof inside the popup; do not call OAuth token or Google ID-token endpoints as normal actions. The authorize URL may include safe activation hints such as screen_hint, activation_mode, device_id, workspace_name, and sign_in_options, but never secrets."
    flows:
      authorizationCode:
        authorizationUrl: https://auth.mad4b.com/auth/oauth/authorize
        tokenUrl: https://auth.mad4b.com/auth/oauth/token
        scopes:
          https://auth.mad4b.com/scopes/tenant.links: Access tenant-scoped Growth Intelligence links for the signed-in user.
          https://auth.mad4b.com/scopes/tenant.status: Read tenant connection status for the signed-in user.
          https://auth.mad4b.com/scopes/tenant.activation: Activate managed or dedicated tenant connection mode for the signed-in user.
          https://auth.mad4b.com/scopes/tenant.install: Provision tenant local connector install bundles for the signed-in user.
          https://auth.mad4b.com/scopes/tenant.system-tools: Use tenant-scoped governed system tools for the signed-in user.
  security:
    - userBearerAuth:
        - https://auth.mad4b.com/scopes/tenant.links
        - https://auth.mad4b.com/scopes/tenant.status
        - https://auth.mad4b.com/scopes/tenant.activation
        - https://auth.mad4b.com/scopes/tenant.install
        - https://auth.mad4b.com/scopes/tenant.system-tools

paths:

  /health:
    get:
      tags: [health]
      security: []
      operationId: getHealth
      summary: Health and queue status
      responses:
        "200":
          description: Service health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /activation/session-context:
    get:
      tags: [activation]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getActivationSessionContext
      summary: Read previous session history and platform scope context
      description: >
        Hard activation layer that reads prior user session envelopes as a
        paginated history log, scoped user request transcripts, plus audit
        activity, developer scopes, API credential scopes, and connected-system
        scopes. Admin/service sessions may also receive execution-log prompt and
        response summaries. Raw dumps are returned only when include_raw=true and
        are size-bounded. User JWT callers may inspect only their own user context.
      parameters:
        - name: user_id
          in: query
          schema: { type: string }
          description: Optional user id. Admin callers may inspect any user; user JWT callers are restricted to themselves.
        - name: tenant_id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
          description: Number of previous session/history rows to return per page.
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
          description: Pagination offset for reading older previous session history.
        - name: include_raw
          in: query
          schema: { type: boolean, default: false }
          description: Include bounded raw request/response dumps where allowed by caller scope.
        - name: raw_max_chars
          in: query
          schema: { type: integer, default: 4000, maximum: 20000 }
          description: Maximum characters per raw dump field when include_raw=true.
      responses:
        "200":
          description: Session history and related platform scopes
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [ok, activation_layer, subject, pagination, session_history, related_scopes, history]
                properties:
                  ok: { type: boolean }
                  activation_layer: { type: string, enum: [session_context] }
                  subject:
                    type: object
                    additionalProperties: false
                    properties:
                      user_id: { type: string }
                      tenant_id: { type: string }
                      is_admin: { type: boolean }
                  last_session:
                    type: object
                    additionalProperties: true
                  pagination:
                    type: object
                    additionalProperties: false
                    properties:
                      limit: { type: integer }
                      offset: { type: integer }
                      include_raw: { type: boolean }
                      raw_max_chars: { type: integer }
                      has_more_session_history: { type: boolean }
                  session_history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        transcript:
                          type: object
                          additionalProperties: false
                          properties:
                            user_request: { type: string }
                            ai_response: { type: string }
                            request_fields_available:
                              type: array
                              items: { type: string }
                        raw_dump:
                          type: object
                          additionalProperties: true
                  related_scopes:
                    type: array
                    items: { type: string }
                  history:
                    type: object
                    additionalProperties: true
                    properties: {}
                  degraded_surfaces:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties: {}
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "500": { description: Session context read failure, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }

  /activation/platform-access:
    get:
      tags: [activation]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getActivationPlatformAccess
      summary: Read platform-wide activation access and registry counts
      description: >
        Hard activation evidence for admin/service sessions. Returns explicit
        all-brand scope plus counts and readiness for brands, plugins, logics,
        engines, and runtime-callable actions.
      responses:
        "200":
          description: Platform-wide activation access summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required: [ok, activation_layer, principal, access_scope, access, counts, readiness]
                properties:
                  ok: { type: boolean }
                  activation_layer: { type: string, enum: [platform_access] }
                  principal:
                    type: object
                    additionalProperties: true
                    properties:
                      type: { type: string }
                      is_admin: { type: boolean }
                      user_id: { type: string }
                      tenant_id: { type: string }
                  access_scope:
                    type: string
                    enum: [platform_admin_all, user_scoped]
                  access:
                    type: object
                    additionalProperties: true
                    properties:
                      brands: { type: string }
                      plugins: { type: string }
                      logics: { type: string }
                      engines: { type: string }
                      actions: { type: string }
                  counts:
                    type: object
                    additionalProperties: true
                    properties:
                      brands: { type: object, additionalProperties: true, properties: {} }
                      plugins: { type: object, additionalProperties: true, properties: {} }
                      logics: { type: object, additionalProperties: true, properties: {} }
                      engines: { type: object, additionalProperties: true, properties: {} }
                      actions: { type: object, additionalProperties: true, properties: {} }
                  readiness:
                    type: object
                    additionalProperties: true
                    properties:
                      brands: { type: string }
                      plugins: { type: string }
                      logics: { type: string }
                      engines: { type: string }
                      actions: { type: string }
                  degraded_surfaces:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties: {}
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "500": { description: Platform access read failure, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }

  /governance/resolve-context-diagnostic:
    post:
      tags: [governance]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: resolveContextDiagnostic
      summary: Resolve governed context diagnostic
      description: >
        Resolves business type, brand path, Brand Core documents, validation
        state, and execution readiness without performing a mutation. This is a
        native backend route in the parent OpenAI schema, so it does not require
        endpoint child schema overlay to pass method/path validation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveContextDiagnosticRequest"
      responses:
        "200":
          description: Governed context diagnostic result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveContextDiagnosticResponse"
        "400":
          description: Invalid diagnostic request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by governance policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Governed context resolution blocked or incomplete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Schema or resolver validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Diagnostic execution failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    post:
      tags: [jobs]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: createJob
      summary: Create an async governed execution job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "200":
          description: Existing job returned due to idempotent deduplication
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/JobSummary"
                  - type: object
                    properties:
                      deduplicated:
                        type: boolean
        "202":
          description: Job accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSummary"
        "400":
          description: Invalid job request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}:
    get:
      tags: [jobs]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getJob
      summary: Get async job status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/JobSummary"
                  - type: object
                    properties:
                      terminal:
                        type: boolean
                      active:
                        type: boolean
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/result:
    get:
      tags: [jobs]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getJobResult
      summary: Get async job result or current completion state
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completed job result or failure payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/JobResultSuccess"
                  - $ref: "#/components/schemas/JobResultFailure"
        "202":
          description: Job is not complete yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResultPending"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /http-execute:
    post:
      tags: [execution]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: executeHttpRequest
      summary: Execute a governed outbound HTTP request
      description: >
        Executes a governed HTTP request. The backend resolves routing, schema,
        auth, and provider-domain rules server-side. Backend bearer auth is
        enforced only when BACKEND_API_KEY is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteHttpRequest"
      responses:
        "200":
          description: Execution response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecuteHttpResponse"
        "400":
          description: Invalid request or routing payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy or execution governance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Target job or target resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Request or response schema validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Execution failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/implementation-plan:
    post:
      tags: [ai]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: generateImplementationPlan
      summary: Generate a structured implementation plan
      description: >
        Generates a Markdown implementation plan from a user prompt via an
        OpenAI-backed planning resolver. The response includes a first-class
        intent_maturation object that must be carried forward into the body of
        a subsequent /ai/task-manifest call to preserve route and workflow
        context continuity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiImplementationPlanRequest"
      responses:
        "200":
          description: Implementation plan generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiImplementationPlanResponse"
        "400":
          description: Missing or blocked intent, or missing userPrompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: OpenAI API key not configured or upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/task-manifest:
    post:
      tags: [ai]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: generateTaskManifest
      summary: Generate a task checklist from an implementation plan
      description: >
        Generates a Markdown task checklist from an implementation plan via an
        OpenAI-backed task resolver. Supply the planMarkdown from a prior
        /ai/implementation-plan response as implementationPlan, and pass the
        full intent_maturation object to preserve route and workflow continuity
        across the two resolver steps.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTaskManifestRequest"
      responses:
        "200":
          description: Task manifest generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTaskManifestResponse"
        "400":
          description: Missing or blocked intent, or missing implementationPlan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: OpenAI API key not configured or upstream failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/registry-readiness:
    get:
      tags: [ai]
      security:
        - backendBearerAuth: []
        - backendApiKeyAuth: []
      operationId: getAiRegistryReadiness
      summary: Check AI resolver intent binding in Task Routes and Workflow Registry
      description: >
        Validation-only diagnostic that confirms the two required AI resolver
        intent keys (ai_implementation_plan_generation and
        ai_task_manifest_generation) are bound to executable Task Routes rows
        and linked Workflow Registry rows. Returns 200 when both bindings are
        fully ready, or 409 when one or more bindings are missing or lack
        executable authority.
      responses:
        "200":
          description: All AI resolver intent keys are route/workflow bound
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRegistryReadinessResponse"
        "401":
          description: Invalid backend API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: One or more AI resolver intent bindings are missing or unresolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRegistryReadinessResponse"
        "500":
          description: Registry readiness check failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

