  /access/resolve:
    post:
      tags: [access]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: resolveAccess
      summary: Run the 6-outcome access decision engine
      description: >
        Evaluates tenant context, membership, subscription, and policy to produce
        one of: ALLOW_SELF_SERVE, ALLOW_WITH_OPTIONAL_ASSISTANCE, REQUIRE_REVIEW,
        REQUIRE_SUPERVISOR_APPROVAL, ROUTE_TO_MANAGED_SERVICE, or DENY.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AccessResolveRequest" }
      responses:
        "200":
          description: Access decision resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessResolveResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

