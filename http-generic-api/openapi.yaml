  /bootstrap/readiness/{tenant_id}:
    get:
      tags: [bootstrap]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: getBootstrapReadiness
      summary: Run 8 first-execution readiness checks for a tenant
      description: >
        Checks: active_tenant_context, active_membership, commercial_eligibility,
        connector_available, workspace_bootstrapped, policy_path_resolved,
        review_path_resolved, managed_assignment_ready. Falls back to legacy tables
        when new platform tables are empty.
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: persist, in: query, schema: { type: boolean } }
      responses:
        "200":
          description: Readiness report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, ready, overall_status, tenant_id, checks]
                properties:
                  ok: { type: boolean }
                  ready: { type: boolean }
                  overall_status: { type: string, enum: [ready, degraded, not_ready] }
                  tenant_id: { type: string }
                  checks: { type: object, additionalProperties: true }
        "401": { $ref: "#/components/responses/Unauthorized" }

