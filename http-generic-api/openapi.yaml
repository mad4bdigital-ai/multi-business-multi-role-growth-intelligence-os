                actor_id: { type: string, format: uuid }
      responses:
        "200": { description: Execution dispatched, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # Status Page (public, no auth)

  /status:
    get:
      tags: [health]
      operationId: getStatus
      summary: Public system status JSON - component health and open incidents
      description: >
        Returns live DB-backed component health (API, DB, tenant_management, identity,
        connector_execution, intent_resolution, observability, release_readiness),
        open incidents, and past 30-day incident history.
        Returns HTTP 503 when overall status is partial_outage or major_outage.
      responses:
        "200":
          description: System operational
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: string, enum: [operational, degraded, partial_outage, major_outage] }
                  status_label: { type: string }
                  components: { type: array, items: { type: object, additionalProperties: true } }
                  active_incidents: { type: array, items: { type: object, additionalProperties: true } }
                  past_incidents: { type: array, items: { type: object, additionalProperties: true } }
                  updated_at: { type: string, format: date-time }
        "503":
          description: Partial or major outage detected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: string }

