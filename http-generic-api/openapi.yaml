    AccessResolveRequest:
      type: object
      additionalProperties: false
      required: [tenant_id]
      properties:
        tenant_id: { type: string, format: uuid }
        user_id:
          type: string
          description: Platform user identifier. UUIDs and registry/user-key strings are accepted.
        risk_level:
          type: string
          enum: [low, medium, high, critical]
