  /system/connectors:
    get:
      tags: [system-layer]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: listSystemConnectors
      summary: List connector systems visible to the current principal
      description: Principal-aware facade over connected_systems. Tenant users are automatically scoped to their tenant; admin principals can inspect all tenants.
      parameters:
        - name: tenant_id
          in: query
          schema: { type: string }
          description: Admin-only filter. Tenant principals are always forced to their own tenant_id.
        - name: status
          in: query
          schema: { type: string, enum: [active, pending, error, archived] }
        - name: connector_family
          in: query
          schema: { type: string }
        - name: provider_family
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Principal-scoped connector registry list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  count: { type: integer }
                  connectors:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Tenant scope violation, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }

  /system/connectors/{system_id}:
    get:
      tags: [system-layer]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: getSystemConnector
      summary: Get one connector system visible to the current principal
      description: Principal-aware connector registry read. Tenant users can only read systems in their tenant; admins can read any system.
      parameters:
        - name: system_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Principal-scoped connector registry record
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  connector:
                    type: object
                    additionalProperties: true
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Tenant scope violation, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        "404": { description: Connector system not found, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }

  /system/tools:
    get:
      tags: [system-layer]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: listSystemTools
      summary: List MCP-style system tools visible to the current principal
      description: Lists fixed OpenAPI-compatible tools available through the auth-host system layer. Tool calls are governed by principal context.
