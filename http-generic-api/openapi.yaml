  # ├втАЭтВм├втАЭтВм Connector Dispatch (Sprint 09) ├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм├втАЭтВм

  /connector/dispatch:
    post:
      tags: [planner]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: connectorDispatch
      summary: Dispatch a connector execution (WordPress transport or content workflow)
      description: >
        Sprint 09 bridge. Accepts either an existing plan_id or creates an ad-hoc
        execution plan from brand_key + workflow_key + tenant_id, then dispatches
        immediately. Use apply=false (default) for dry-run preview.
        WordPress connector resolves brand credentials and calls runWordpressConnectorMigration.
        Content workflows queue async dispatch and return a run_id to poll.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id: { type: string, format: uuid, description: "Existing validated/approved plan. If omitted an ad-hoc plan is created." }
                tenant_id: { type: string, format: uuid }
                user_id: { type: string, format: uuid }
                brand_key: { type: string }
                target_key: { type: string }
                workflow_key: { type: string }
                intent_key: { type: string }
                apply: { type: boolean, default: false }
                post_types: { type: array, items: { type: string }, default: ["post"] }
                publish_status: { type: string, enum: [draft, publish, private], default: draft }
      responses:
        "200":
          description: Dispatch completed or queued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, run_id, trace_id, plan_id, connector_type]
                properties:
                  ok: { type: boolean }
                  run_id: { type: string }
                  trace_id: { type: string }
                  plan_id: { type: string }
                  connector_type: { type: string, enum: [wordpress, content_workflow] }
                  plan_status: { type: string }
                  apply: { type: boolean }
                  duration_ms: { type: integer }
                  result: { type: object, additionalProperties: true }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Access denied ├втВмтАЭ requires human approval, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /connector/dispatch/status/{run_id}:
    get:
      tags: [planner]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: getConnectorDispatchStatus
      summary: Poll connector dispatch status by workflow run ID
      parameters:
        - { name: run_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Run status with steps, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

