  /developer-apps/{app_id}/credentials:
    post:
      tags: [developer-api]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: createApiCredential
      summary: Generate an API key for a developer app (full key returned once only)
      description: >
        Generates a key in format pk_<8-char-prefix>_<32-char-random>.
        Only the SHA-256 hash is stored. The full key is returned once in this
        response and cannot be retrieved again.
      parameters:
        - { name: app_id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
                expires_at: { type: string, format: date-time }
                scopes: { type: array, items: { type: string } }
      responses:
        "201":
          description: API key generated (store immediately ├втВмтАЭ not retrievable again)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, credential_id, api_key, key_prefix]
                properties:
                  ok: { type: boolean }
                  credential_id: { type: string, format: uuid }
                  api_key: { type: string, description: "Full key ├втВмтАЭ store now, not retrievable again." }
                  key_prefix: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

