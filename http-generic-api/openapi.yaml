  /quota-rules:
    post:
      tags: [observability]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: createQuotaRule
      summary: Create or upsert a quota rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [meter_key, limit_value, period]
              properties:
                meter_key: { type: string }
                limit_value: { type: number }
                period: { type: string, enum: [daily, monthly, rolling_30d] }
                plan_id: { type: string, format: uuid }
                tenant_id: { type: string, format: uuid }
                enforcement: { type: string, enum: [hard, soft], default: hard }
      responses:
        "201": { description: Quota rule created, content: { application/json: { schema: { $ref: "#/components/schemas/OkResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /quota-check/{tenant_id}/{meter_key}:
    get:
      tags: [observability]
      security: [backendBearerAuth: [], backendApiKeyAuth: []]
      operationId: checkQuota
      summary: Check current quota usage against applicable limit
      description: >
        Resolves the applicable quota rule in priority order: tenant override ├втАатАЩ
        plan-level rule ├втАатАЩ global rule. Returns current usage, limit, and whether
        the tenant is within quota.
      parameters:
        - { name: tenant_id, in: path, required: true, schema: { type: string } }
        - { name: meter_key, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Quota check result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, within_quota]
                properties:
                  ok: { type: boolean }
                  within_quota: { type: boolean }
                  meter_key: { type: string }
                  current_usage: { type: number }
                  limit_value: { type: number }
                  period: { type: string }
                  enforcement: { type: string }
                  rule_source: { type: string, enum: [tenant_override, plan_level, global] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

