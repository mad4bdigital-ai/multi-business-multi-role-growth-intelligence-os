      responses:
        '200':
          description: Execution dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /bootstrap/readiness/{tenant_id}:
    get:
      tags:
        - bootstrap
      security:
        - backendBearerAuth: []
      operationId: getBootstrapReadiness
      summary: Run 8 first-execution readiness checks for a tenant
      description: |
        Checks: active_tenant_context, active_membership, commercial_eligibility, connector_available, workspace_bootstrapped, policy_path_resolved, review_path_resolved, managed_assignment_ready. Falls back to legacy tables when new platform tables are empty.
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: persist
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Readiness report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - ok
                  - ready
                  - overall_status
                  - tenant_id
                  - checks
                properties:
                  ok:
                    type: boolean
                  ready:
                    type: boolean
                  overall_status:
                    type: string
                    enum:
                      - ready
                      - degraded
                      - not_ready
                  tenant_id:
                    type: string
                  checks:
                    type: object
                    additionalProperties: true
                    properties: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bootstrap/onboarding:
    post:
      tags:
        - bootstrap
      security:
        - backendBearerAuth: []
      operationId: createOnboardingState
      summary: Create or reset onboarding state for a tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tenant_id
              properties:
                tenant_id:
                  type: string
                  format: uuid
                onboarding_template:
                  type: string
                current_step:
                  type: string
      responses:
        '201':
          description: Onboarding state created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags:
        - bootstrap
      security:
        - backendBearerAuth: []
      operationId: listOnboardingStates
      summary: List onboarding states
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Onboarding states
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /bootstrap/onboarding/{tenant_id}/step:
    patch:
      tags:
        - bootstrap
      security:
        - backendBearerAuth: []
      operationId: advanceOnboardingStep
      summary: Advance or update the onboarding step for a tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_step
              properties:
                current_step:
                  type: string
                completion_status:
                  type: string
                  enum:
                    - in_progress
                    - complete
                    - skipped
                step_data:
                  type: object
                  additionalProperties: true
                  properties: {}
      responses:
        '200':
          description: Step advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
