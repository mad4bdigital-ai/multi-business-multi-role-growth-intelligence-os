  /quota-check/{tenant_id}/{meter_key}:
    get:
      tags:
        - observability
      security:
        - backendBearerAuth: []
      operationId: checkQuota
      summary: Check current quota usage against applicable limit
      description: |
        Resolves the applicable quota rule in priority order: tenant override → plan-level rule → global rule. Returns current usage, limit, and whether the tenant is within quota.
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: meter_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quota check result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - ok
                  - within_quota
                properties:
                  ok:
                    type: boolean
                  within_quota:
                    type: boolean
                  meter_key:
                    type: string
                  current_usage:
                    type: number
                  limit_value:
                    type: number
                  period:
                    type: string
                  enforcement:
                    type: string
                  rule_source:
                    type: string
                    enum:
