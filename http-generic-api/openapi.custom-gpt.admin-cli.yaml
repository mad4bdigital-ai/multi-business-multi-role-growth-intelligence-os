  /admin/control:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: executeAdminControl
      summary: Execute personal admin control operation
      description: Root-level personal administrator endpoint for GitHub CLI, gcloud CLI, remote database SQL control through the configured application pool, and local runtime environment inspection or mutation, plus disabled-by-default allowlisted local Windows app launch. This endpoint is intended only for the own.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - tool
              allOf:
                - if:
                    properties:
                      tool:
                        const: db
                    required:
                      - tool
                  then:
                    required:
                      - sql
                - if:
                    properties:
                      tool:
                        const: shell
                    required:
                      - tool
                  then:
                    required:
                      - action
                      - alias
              properties:
                tool:
                  type: string
                  enum:
                    - github
                    - gcloud
                    - db
                    - env
                    - windows_app
                    - hostinger
                    - cloudflare
                    - shell
                args:
                  type: array
                  items:
                    type: string
                  description: Arguments for github, gcloud, or shell tools.
                timeout_ms:
                  type: integer
                  minimum: 1000
                  maximum: 600000
                  default: 120000
                  description: Request timeout in milliseconds. Use timeout_ms (not timeout).
                sql:
                  type: string
                  description: SQL statement for the db tool.
                params:
                  type: array
                  items: {}
                  description: Positional SQL parameters for the db tool.
                action:
                  type: string
                  enum:
                    - run
                    - list
                    - get
                    - set
                    - unset
                    - status
                    - authorize
                    - launch
                  default: list
                  description: Action selector. Use run for db and shell execution, list/get/set/unset for env, and status/authorize/list/launch for windows_app.
                name:
                  type: string
                  description: Environment variable name for env get, set, or unset.
                value:
                  type: string
                  description: Environment variable value for env set.
                include_values:
                  type: boolean
                  default: false
                  description: Include environment values when listing variables.
                reveal_values:
                  type: boolean
                  default: false
                  description: Return unmasked environment values, including sensitive-looking names.
                alias:
                  type: string
                  description: Shell command alias to run from ADMIN_SHELL_ALLOWLIST when tool=shell action=run.
                app_alias:
                  type: string
                  description: Allowlisted local Windows app alias for windows_app launch.
      responses:
        '200':
          description: Admin control operation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - tool
                  - result
                properties:
                  ok:
                    type: boolean
                  tool:
                    type: string
                    enum:
                      - github
                      - gcloud
                      - db
                      - env
                      - windows_app
                      - hostinger
                      - cloudflare
                      - shell
                  result:
                    type: object
                    additionalProperties: true
                    properties: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Admin control execution failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/cli/hostinger:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: executeHostingerApiCall
      summary: Forward a call to the Hostinger REST API
      description: Proxies any Hostinger API call using server-stored API keys. Use cloud_plan key for VPS, DNS, domains, and billing. Use shared_manager key for shared hosting. Supply the path only, e.g. /v1/dns/zone/mad4b.com/records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - path
              properties:
                path:
                  type: string
                  description: Hostinger API path, e.g. /v1/dns/zone/mad4b.com/records or /v1/vps/virtual-machines
                method:
                  type: string
                  enum:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                  default: GET
                request_body:
                  type: object
                  additionalProperties: true
                  description: JSON body for POST/PUT/PATCH requests.
                  properties: {}
                params:
                  type: object
                  additionalProperties: true
                  description: Query string parameters to append.
                  properties: {}
                api_key_ref:
                  type: string
                  enum:
                    - cloud_plan
                    - shared_manager
                  default: cloud_plan
                  description: cloud_plan for VPS/DNS/domains/billing; shared_manager for shared hosting.
      responses:
        '200':
          description: Hostinger API response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - result
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    additionalProperties: true
                    properties:
                      status:
                        type: integer
                      ok:
                        type: boolean
                      data:
                        type: object
                        additionalProperties: true
                        properties: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Hostinger API call failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/cli/cloudflare:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: executeCloudflareApiCall
      summary: Forward a call to the Cloudflare REST API
      description: Proxies any Cloudflare API call using server-stored credentials. Supply the path only, e.g. /client/v4/zones or /client/v4/tunnels/{tunnel_id}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - path
              properties:
                path:
                  type: string
                  description: Cloudflare API path, e.g. /client/v4/zones or /client/v4/accounts/{account_id}/tunnels
                method:
                  type: string
                  enum:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                  default: GET
                request_body:
                  type: object
                  additionalProperties: true
                  description: JSON body for POST/PUT/PATCH requests.
                  properties: {}
                params:
                  type: object
                  additionalProperties: true
                  description: Query string parameters to append.
                  properties: {}
      responses:
        '200':
          description: Cloudflare API response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - result
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    additionalProperties: true
                    properties: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Cloudflare API call failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/cli/local-connector/install-bundle:
    get:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: getLocalConnectorInstallBundle
      summary: Generate and upload local connector installer
      description: Generate a pre-filled Windows .bat installer for the local connector stack (cloudflared + Node.js service via NSSM). Reads cf_token and connector_secret from local_connector_user_configs in DB for the given user_id + device_id. Falls back to server env only if no DB row exists. Uploads to Google Dr.
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
          description: User ID whose device config to load from DB. Defaults to platform admin.
        - name: device_id
          in: query
          required: false
          schema:
            type: string
          description: Device ID (hostname) to load config for. Defaults to mohammedlap.
      responses:
        '200':
          description: Installer uploaded, drive link returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - drive
                properties:
                  ok:
                    type: boolean
                  drive:
                    type: object
                    additionalProperties: true
                    properties:
                      file_id:
                        type: string
                      drive_link:
                        type: string
                      filename:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Install bundle generation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/cli/local-connector/self-repair:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: repairLocalConnector
      summary: Self-repair the admin local connector
      description: CALL IMMEDIATELY when connector.mad4b.com returns error 1033 or HTTP 530 — do NOT just report the error. Reads device config (cf_token, connector_secret) from local_connector_user_configs in DB, checks Cloudflare tunnel health via API, generates a pre-filled Windows .bat installer (cloudflared + NS.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                user_id:
                  type: string
                  description: User ID whose device to repair. Defaults to platform admin.
                device_id:
                  type: string
                  description: Device hostname to repair. Defaults to mohammedlap.
      responses:
        '200':
          description: Self-repair result with diagnosis and drive link
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - diagnosis
                  - repair
                properties:
                  ok:
                    type: boolean
                  diagnosis:
                    type: object
                    additionalProperties: true
                    properties:
                      device_id:
                        type: string
                      tunnel_url:
                        type: string
                      cf_tunnel_id:
                        type: string
                      cf_tunnel_status:
                        type: string
                      config_source:
                        type: string
                        enum:
                          - db
                          - env
                  repair:
                    type: object
                    additionalProperties: true
                    properties:
                      action:
                        type: string
                      drive:
                        type: object
                        additionalProperties: true
                        properties:
                          file_id:
                            type: string
                          drive_link:
                            type: string
                          filename:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Self-repair failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/cli/dns:
    get:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: listDnsRecords
      summary: List DNS records for a zone
      description: Lists all DNS records for the specified zone via Cloudflare API. Defaults to mad4b.com.
      parameters:
        - name: zone
          in: query
          required: false
          schema:
            type: string
            default: mad4b.com
          description: Domain zone to query, e.g. mad4b.com.
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by record type, e.g. A, CNAME, TXT.
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filter by record name.
      responses:
        '200':
          description: DNS record list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - records
                properties:
                  ok:
                    type: boolean
                  zone:
                    type: string
                  records:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: DNS list failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: upsertDnsRecord
      summary: Create or update a DNS record
      description: Creates a new DNS record or updates an existing one by name + type. Proxied is false by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - name
                - type
                - content
              properties:
                zone:
                  type: string
                  default: mad4b.com
                  description: Domain zone, e.g. mad4b.com.
                name:
                  type: string
                  description: Record name, e.g. api or connector.
                type:
                  type: string
                  enum:
                    - A
                    - AAAA
                    - CNAME
                    - TXT
                    - MX
                    - NS
                  description: DNS record type.
                content:
                  type: string
                  description: Record value, e.g. an IP address or CNAME target.
                ttl:
                  type: integer
                  default: 1
                  description: TTL in seconds. 1 = auto.
                proxied:
                  type: boolean
                  default: false
                  description: Whether Cloudflare proxies the record.
      responses:
        '200':
          description: DNS record created or updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                  - record
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                    enum:
                      - created
                      - updated
                  record:
                    type: object
                    additionalProperties: true
                    properties: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: DNS upsert failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: deleteDnsRecord
      summary: Delete a DNS record by ID
      description: Deletes a DNS record from the specified zone using its Cloudflare record ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - record_id
              properties:
                zone:
                  type: string
                  default: mad4b.com
                  description: Domain zone, e.g. mad4b.com.
                record_id:
                  type: string
                  description: Cloudflare DNS record ID to delete.
      responses:
        '200':
          description: DNS record deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                  deleted_id:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: DNS delete failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/platform-jwt/issue:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: issuePlatformJwtClientToken
      summary: Issue a short-lived tenant user JWT
      description: Admin-only platform JWT client. Mints a short-lived user JWT for an existing active user so governed tenant /connect/* calls can use user auth without relaxing tenant guards.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                user_id:
                  type: string
                  description: Existing active platform user ID. Required when email is omitted.
                email:
                  type: string
                  description: Existing active platform user email. Required when user_id is omitted.
                tenant_id:
                  type: string
                  nullable: true
                  description: Optional tenant. When supplied, the user must have active membership.
                ttl_seconds:
                  type: integer
                  minimum: 60
                  maximum: 3600
                  default: 900
                reason:
                  type: string
                  description: Short audit hint for why the token is being issued.
      responses:
        '200':
          description: Short-lived user JWT issued
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  ok:
                    type: boolean
                  token_type:
                    type: string
                    example: Bearer
                  access_token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    type: object
                    additionalProperties: true
                    properties: {}
                  tenant:
                    type: object
                    additionalProperties: true
                    properties: {}
                  next_step:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin principal or tenant membership required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Platform JWT issue failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/session-continuity/link-user:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: linkSessionContinuityUser
      summary: Link unassigned request envelopes to a user
      description: Assigns user_id to unlinked request_envelopes rows and backfills tenant_id when null. Use this as a governed alternative to raw SQL for session continuity repair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - user_id
                - tenant_id
              properties:
                user_id:
                  type: string
                  format: uuid
                tenant_id:
                  type: string
                  format: uuid
                scope:
                  type: string
                  enum:
                    - current_unlinked_sessions
                    - tenant_unlinked_sessions
                  default: current_unlinked_sessions
                  description: current_unlinked_sessions updates all rows with user_id null; tenant_unlinked_sessions limits updates to rows with matching tenant_id and user_id null.
      responses:
        '200':
          description: Session continuity rows linked
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - ok
                  - result
                properties:
                  ok:
                    type: boolean
                  result:
                    type: object
                    additionalProperties: false
                    required:
                      - user_id
                      - tenant_id
                      - scope
                      - matched_before
                      - updated_rows
                      - remaining_unlinked
                    properties:
                      user_id:
                        type: string
                        format: uuid
                      tenant_id:
                        type: string
                        format: uuid
                      scope:
                        type: string
                        enum:
                          - current_unlinked_sessions
                          - tenant_unlinked_sessions
                      matched_before:
                        type: integer
                      updated_rows:
                        type: integer
                      remaining_unlinked:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Session continuity linking failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schema-import/upload:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: importSchemaUpload
      summary: Upload a full OpenAPI schema file and split it into the registry
      description: Accepts a full OpenAPI 3.x schema string. Parses it, inlines $refs, splits per operation, upserts the parent action row and one endpoint row per operation with a compact dereferenced schema_json. Removed endpoints are deprecated. Returns a job record for audit and rollback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - schema_yaml
              properties:
                schema_yaml:
                  type: string
                  description: Full OpenAPI YAML or JSON content as a string. Use schema_json as an alias.
                schema_json:
                  type: string
                  description: Alias for schema_yaml - supply one or the other.
                action_key:
                  type: string
                  description: Override the action_key derived from the schema info.title slug. Useful when the title does not produce a clean key.
                filename:
                  type: string
                  description: Original filename for audit purposes, e.g. openapi.wordpress.yaml.
                imported_by:
                  type: string
                  description: Actor reference logged against the import job.
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
                  action_key:
                    type: string
                  endpoints_upserted:
                    type: integer
                  endpoints_deprecated:
                    type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Schema parse or import failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schema-import/repo:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: importSchemaFromRepo
      summary: Install an OpenAPI schema directly from a GitHub or GitLab repo URL
      description: |
        Fetches the schema file from a GitHub or GitLab repository (converting the repo URL to a raw content URL automatically), then runs the same splitter pipeline as the upload endpoint. Supports pinning to a specific branch, tag, or commit via ref. Returns a job record for audit and rollback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repo_url
              properties:
                repo_url:
                  type: string
                  description: GitHub repo URL (e.g. https://github.com/owner/repo) or a direct raw schema URL.
                path_in_repo:
                  type: string
                  default: openapi.yaml
                  description: Path to the schema file within the repo. Defaults to openapi.yaml.
                ref:
                  type: string
                  default: main
                  description: Git branch, tag, or commit SHA to fetch from. Defaults to main.
                action_key:
                  type: string
                  description: Override the action_key derived from the schema info.title slug.
                imported_by:
                  type: string
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
                  action_key:
                    type: string
                  endpoints_upserted:
                    type: integer
                  endpoints_deprecated:
                    type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Fetch or import failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schema-import/rollback:
    post:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: rollbackSchemaImport
      summary: Restore endpoint schemas to a previous import job's snapshot
      description: Restores endpoint schema_json values for the given action_key to the state captured in the target job's snapshots. Post-job endpoints are deprecated; removed endpoints restored to active. Creates a new rollback job row for audit - the original job is never mutated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action_key
                - job_id
              properties:
                action_key:
                  type: string
                  description: The action_key to roll back.
                job_id:
                  type: string
                  description: The schema_import_jobs.job_id to restore from. Must have status=completed.
                requested_by:
                  type: string
                  description: Actor reference logged against the rollback job.
      responses:
        '200':
          description: Rollback completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
                  action_key:
                    type: string
                  endpoints_restored:
                    type: integer
                  rolled_back_to_job:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Rollback failure - job not found or not completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/schema-import/jobs:
    get:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: listSchemaImportJobs
      summary: List schema import jobs with optional action_key filter
      parameters:
        - name: action_key
          in: query
          schema:
            type: string
          description: Filter by action_key. Omit to list all jobs.
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  count:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchemaImportJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /admin/schema-import/jobs/{job_id}:
    get:
      tags:
        - admin-control
      security:
        - backendBearerAuth: []
      operationId: getSchemaImportJob
      summary: Get a single schema import job including endpoint snapshots
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job:
                    allOf:
                      - $ref: '#/components/schemas/SchemaImportJob'
                      - type: object
                        properties:
                          endpoint_snapshots:
                            type: array
                            items:
                              type: object
                              properties:
                                path:
                                  type: string
                                method:
                                  type: string
                                operationId:
                                  type: string
                                schema_json:
                                  type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
